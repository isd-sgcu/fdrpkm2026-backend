name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  linear-ticket:
    name: Linear ticket ID
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title or branch name for ISD-## ticket ID
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if echo "$PR_TITLE" | grep -qiE 'ISD-[0-9]+'; then
            echo "Found ticket ID in PR title: $PR_TITLE"
          elif echo "$BRANCH_NAME" | grep -qiE 'ISD-[0-9]+'; then
            echo "Found ticket ID in branch name: $BRANCH_NAME"
          else
            echo "::error::No Linear ticket ID found. Add ISD-## to the PR title (e.g. [ISD-42] Add house routes) or use it in the branch name (e.g. feat/isd-42-house-routes)."
            exit 1
          fi

  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
